<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMES City</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,-25,0" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="free-space"></div>
    <nav>
        <div class="titles">
            <h3><a href="#voyager">ANALYSIS</a></h3>
            <h3><a href="#pricing">PRICING</a></h3>
            <h3>ABOUT US</h3>
        </div>
    </nav>

    <div class="mother-div">
        <div class="container">
            <div>
                <img src="/images/AMES 3D.png" alt="Can" class="can">
            </div>  
            <div class="titletext">
                <h1 class="GREEN">AMES</h1>
                <h1 class="TEA">CITY</h1>
            </div>
        </div>
        
        <div class="rotcan">
            <img src="/images/circle.png" alt="Circle" class="bg-circle">
            <img src="/images/white_can.png" alt="White Can" class="main-can">
        </div>
        
        <div class="predictive_section">
            
            <div id="pricing">
                <h1>Find your dream home at AMES</h1>
            </div>

            <div class="form">
                <form id="prediction-form">
                    <label for="overall_qual">Overall Quality:</label>
                    <input type="number" id="overall_qual" placeholder='Min: 1 Max: 10' required>
                    
                    <label for="gr_liv_area">Above Ground Living Area:</label>
                    <input type="number" id="gr_liv_area" placeholder='Up to 5000 sq ft' required>

                    <label for="total_bsmt_sf">Total Basement Area preferred:</label>
                    <input type="number" id="total_bsmt_sf" placeholder='Max 6000 sq ft' required>

                    <button type="submit">Get Price Estimate</button>
                </form>
                
                <div id="result-container" style="display: none; margin-top: 20px; text-align: center; color: antiquewhite;">
                    <h3>Estimated Price Range:</h3>
                    <p id="price-range" style="font-size: 24px; font-weight: bold; color: #4CAF50;"></p>
                </div>

            </div>
        </div> </div> <div class="free-space"></div>
    
    <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 15-6-6-6 6"/>
        </svg>
    </button>
    <script src='script.js'></script>
</body>
</html>
